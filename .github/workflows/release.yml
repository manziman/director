name: Release

# Manual-only. Releases never happen on a normal push — you trigger them when you
# want one (Actions → Release → Run workflow, or `gh workflow run release.yml`).
# python-semantic-release then computes the next version from the conventional
# commits since the last tag, updates the changelog, tags, makes a GitHub release,
# and publishes to PyPI via Trusted Publishing. No releasable commits → no-op.
on:
  workflow_dispatch:

concurrency:
  group: release
  cancel-in-progress: false

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write        # push the version commit + tag, create the GitHub release
      id-token: write        # PyPI Trusted Publishing (OIDC) — no API token needed
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0      # semantic-release needs full history to analyze commits
          token: ${{ secrets.GITHUB_TOKEN }}
      - name: Python Semantic Release
        id: release
        uses: python-semantic-release/python-semantic-release@v9
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
      - name: Publish to PyPI
        if: steps.release.outputs.released == 'true'
        uses: pypa/gh-action-pypi-publish@release/v1
