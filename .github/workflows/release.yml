name: Release

# Manual-only. Releases never happen on a normal push — you trigger them when you
# want one (Actions → Release → Run workflow, or `gh workflow run release.yml`).
# python-semantic-release then computes the next version from the conventional
# commits since the last tag, updates the changelog, tags, makes a GitHub release,
# and publishes to PyPI via Trusted Publishing. No releasable commits → no-op.
on:
  workflow_dispatch:

concurrency:
  group: release
  cancel-in-progress: false

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write        # default-token fallback; the PAT below does the actual push
      id-token: write        # PyPI Trusted Publishing (OIDC) — no API token needed
    steps:
      # RELEASE_TOKEN is a PAT (Contents: read+write) whose owner is on the `main`
      # ruleset's bypass list, so semantic-release can push the version commit + tag
      # to the PR-protected main branch. Falls back to GITHUB_TOKEN if unset (which
      # will be rejected by branch protection — set the secret to enable releases).
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0      # semantic-release needs full history to analyze commits
          token: ${{ secrets.RELEASE_TOKEN || secrets.GITHUB_TOKEN }}
      - name: Python Semantic Release
        id: release
        uses: python-semantic-release/python-semantic-release@0dc72ac9058a62054a45f6344c83a423d7f906a8 # v9
        with:
          github_token: ${{ secrets.RELEASE_TOKEN || secrets.GITHUB_TOKEN }}
      - name: Publish to PyPI
        if: steps.release.outputs.released == 'true'
        uses: pypa/gh-action-pypi-publish@cef221092ed1bacb1cc03d23a2d87d1d172e277b # release/v1
