<!doctype html>
<!-- director agent — read-only multi-job dashboard. Self-contained like
     index.html (no CDN, no build step). Consumes /api/agent and /api/jobs;
     each job card links to /job/<id>/ which serves the single-run dashboard
     scoped to that job's artifacts. Strictly read-only: this page only GETs. -->
<html lang="en">
<head>
<meta charset="utf-8">
<title>director agent</title>
<meta name="viewport" content="width=device-width, initial-scale=1">
<style>
  :root {
    --bg: #0d1117; --panel: #161b22; --border: #30363d; --fg: #e6edf3;
    --dim: #8b949e; --accent: #388bfd;
    --done: #2ea043; --pending: #6e7681; --running: #388bfd;
    --escalated: #d29922; --failed: #f85149;
  }
  * { box-sizing: border-box; }
  body { margin: 0; background: var(--bg); color: var(--fg);
         font: 14px/1.45 ui-monospace, SFMono-Regular, Menlo, Consolas, monospace; }
  header { padding: 14px 20px; border-bottom: 1px solid var(--border); background: var(--panel); }
  header h1 { margin: 0 0 2px; font-size: 16px; font-weight: 600; }
  header .sub { color: var(--dim); font-size: 12.5px; }
  #conn { float: right; font-size: 12px; color: var(--dim); }
  #conn.err { color: var(--failed); }
  .chips { display: flex; flex-wrap: wrap; gap: 8px; margin-top: 10px; }
  .chip { border: 1px solid var(--border); border-radius: 999px; padding: 2px 12px;
          background: var(--bg); font-size: 12px; color: var(--dim); cursor: pointer; }
  .chip.on { border-color: var(--accent); color: var(--fg); }
  .chip b { color: var(--fg); font-weight: 600; }
  main { padding: 16px 20px; }
  .repo h2 { font-size: 13px; color: var(--dim); text-transform: uppercase;
             letter-spacing: .06em; margin: 18px 0 8px; }
  .cards { display: grid; grid-template-columns: repeat(auto-fill, minmax(340px, 1fr)); gap: 12px; }
  a.card { display: block; text-decoration: none; color: var(--fg); background: var(--panel);
           border: 1px solid var(--border); border-radius: 8px; padding: 12px 14px; }
  a.card:hover { border-color: var(--accent); }
  .card .id { font-weight: 600; font-size: 13px; }
  .card .task { color: var(--dim); font-size: 12px; margin: 4px 0; white-space: nowrap;
                overflow: hidden; text-overflow: ellipsis; }
  .card .meta { display: flex; flex-wrap: wrap; gap: 6px 14px; font-size: 12px;
                color: var(--dim); margin-top: 6px; }
  .state { border-radius: 999px; padding: 0 10px; font-size: 11.5px; border: 1px solid; }
  .state.succeeded { color: var(--done); border-color: var(--done); }
  .state.running, .state.preparing { color: var(--running); border-color: var(--running); }
  .state.queued { color: var(--pending); border-color: var(--pending); }
  .state.interrupted { color: var(--escalated); border-color: var(--escalated); }
  .state.failed, .state.cancelled, .state.lost { color: var(--failed); border-color: var(--failed); }
  .bar { height: 5px; background: var(--border); border-radius: 3px; margin-top: 8px;
         overflow: hidden; display: flex; }
  .bar div { height: 100%; }
  .err { color: var(--failed); }
  .empty { padding: 60px 20px; text-align: center; color: var(--dim); font-size: 15px; }
</style>
</head>
<body>
<header>
  <span id="conn">connecting…</span>
  <h1>director agent</h1>
  <div class="sub" id="agentinfo"></div>
  <div class="chips" id="filters"></div>
</header>
<main id="main"><div class="empty">loading…</div></main>
<script>
"use strict";
const STATES = ["queued","preparing","running","succeeded","failed","cancelled","interrupted","lost"];
let filter = null;

function h(tag, attrs, ...children) {
  const el = document.createElement(tag);
  for (const [k, v] of Object.entries(attrs || {})) {
    if (k === "class") el.className = v; else el.setAttribute(k, v);
  }
  for (const c of children) el.append(c);
  return el;
}

function bar(dag) {
  const total = dag && dag.total || 0;
  if (!total) return null;
  const by = dag.by_status || {};
  const el = h("div", {class: "bar"});
  const colors = {done: "var(--done)", running: "var(--running)",
                  escalated: "var(--escalated)", failed: "var(--failed)"};
  for (const [status, color] of Object.entries(colors)) {
    const n = by[status] || 0;
    if (!n) continue;
    const seg = h("div"); seg.style.width = (100 * n / total) + "%";
    seg.style.background = color; el.append(seg);
  }
  return el;
}

function card(j) {
  const dag = j.dag || {};
  const done = (dag.by_status || {}).done || 0;
  const a = h("a", {class: "card", href: "/job/" + encodeURIComponent(j.job_id) + "/"},
    h("div", {}, h("span", {class: "id"}, j.job_id), " ",
      h("span", {class: "state " + j.state}, j.state)),
    h("div", {class: "task"}, j.task || j.message || ""),
    h("div", {class: "meta"},
      h("span", {}, "branch " + (j.job_branch || "?")),
      h("span", {}, "nodes " + done + "/" + (dag.total || 0)),
      h("span", {}, "$" + (j.cost_total || 0).toFixed(4)),
      h("span", {}, j.submitted_at || "")));
  const b = bar(dag);
  if (b) a.append(b);
  if (j.error && j.error.message) a.append(h("div", {class: "meta err"}, j.error.message));
  return a;
}

function render(jobs) {
  const main = document.getElementById("main");
  main.replaceChildren();
  const shown = filter ? jobs.filter(j => j.state === filter) : jobs;
  if (!shown.length) {
    main.append(h("div", {class: "empty"},
      jobs.length ? "no jobs in state “" + filter + "”"
                  : "no jobs yet — submit one with `director agent submit`"));
    return;
  }
  const byRepo = new Map();
  for (const j of shown) {
    const key = j.repo || "(unknown repo)";
    if (!byRepo.has(key)) byRepo.set(key, []);
    byRepo.get(key).push(j);
  }
  for (const [repo, list] of byRepo) {
    const sec = h("section", {class: "repo"}, h("h2", {}, repo));
    const cards = h("div", {class: "cards"});
    for (const j of list) cards.append(card(j));
    sec.append(cards);
    main.append(sec);
  }
}

function renderFilters(jobs) {
  const wrap = document.getElementById("filters");
  wrap.replaceChildren();
  const counts = {};
  for (const j of jobs) counts[j.state] = (counts[j.state] || 0) + 1;
  const all = h("span", {class: "chip" + (filter ? "" : " on")});
  all.append("all ", h("b", {}, String(jobs.length)));
  all.onclick = () => { filter = null; refresh(); };
  wrap.append(all);
  for (const s of STATES) {
    if (!counts[s]) continue;
    const chip = h("span", {class: "chip" + (filter === s ? " on" : "")});
    chip.append(s + " ", h("b", {}, String(counts[s])));
    chip.onclick = () => { filter = (filter === s ? null : s); refresh(); };
    wrap.append(chip);
  }
}

let lastJobs = [];
async function refresh() {
  const conn = document.getElementById("conn");
  try {
    const [agentR, jobsR] = await Promise.all([fetch("api/agent"), fetch("api/jobs")]);
    const agent = await agentR.json();
    const jobs = (await jobsR.json()).jobs || [];
    lastJobs = jobs;
    conn.textContent = "live";
    conn.className = "";
    const info = document.getElementById("agentinfo");
    info.textContent = "v" + agent.version + " · " + agent.data_dir + " · " +
      (agent.jobs ? agent.jobs.running + " running / " + agent.jobs.queued + " queued" : "");
    renderFilters(jobs);
    render(jobs);
  } catch (e) {
    conn.textContent = "disconnected";
    conn.className = "err";
    renderFilters(lastJobs);
    render(lastJobs);
  }
}
refresh();
setInterval(refresh, 2000);
</script>
</body>
</html>
